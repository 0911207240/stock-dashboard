name: Daily Stock Scan

on:
  schedule:
    - cron: "20 0 * * 1-5"   # 08:20 台灣（備援）
    - cron: "30 0 * * 1-5"   # 08:30 台灣（主要）
    - cron: "40 0 * * 1-5"   # 08:40 台灣（備援）
    - cron: "50 0 * * 1-5"   # 08:50 台灣（備援）
    - cron: "0 1 * * 1-5"    # 09:00 台灣（備援）
    - cron: "10 1 * * 1-5"   # 09:10 台灣（備援）
    - cron: "20 1 * * 1-5"   # 09:20 台灣（備援）
    - cron: "30 1 * * 1-5"   # 09:30 台灣（備援）
    - cron: "30 4 * * 1-5"   # 12:30 台灣（午盤更新）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Taipei

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set date key
        run: echo "TODAY=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Restore price data cache
        uses: actions/cache@v4
        with:
          path: data_cache/
          key: price-cache-${{ env.TODAY }}
          restore-keys: |
            price-cache-

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Chinese fonts
        run: |
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: python scanner.py

      - name: Notify failure
        if: failure()
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -d "{\"to\":\"$LINE_USER_ID\",\"messages\":[{\"type\":\"text\",\"text\":\"⚠️ 今日股票掃描失敗\n請至 GitHub Actions 查看錯誤：\nhttps://github.com/0911207240/stock-dashboard/actions\"}]}"

      - name: Save state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in push_cooldown.json daytrade_history.json signal_history.json scoring_weights.json tdcc_cache.json morning_lock.json market_log.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
